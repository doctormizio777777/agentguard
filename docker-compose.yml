services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AGENT_GUARDRAIL_DB: /data/agent_payment_guardrail.db
    ports:
      - "8000:8000"
    volumes:
      - agentguard-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  agentguard-data:
