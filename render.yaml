services:
  - type: web
    name: agentguard-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_RESET_KEY
        sync: false
      - key: AUTO_RESEED_MINUTES
        value: "60"
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: INTENT_MODEL
        value: openai/gpt-5.6-sol
      - key: OR_HTTP_REFERER
        value: https://github.com/doctormizio777777/agentguard
      - key: OR_X_TITLE
        value: AgentGuard
